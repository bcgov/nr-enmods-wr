apiVersion: v1
kind: ServiceAccount
metadata:
  name: aqi-cronjob-sa
  namespace: "{{ .Release.Namespace }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aqi-cronjob-postgres-restarter
  namespace: "{{ .Release.Namespace }}"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollout"]
    verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aqi-cronjob-sa-restarter
  namespace: "{{ .Release.Namespace }}"
subjects:
  - kind: ServiceAccount
    name: aqi-cronjob-sa
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: aqi-cronjob-postgres-restarter
  apiGroup: rbac.authorization.k8s.io